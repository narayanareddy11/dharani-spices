backend:
  name: git-gateway
  branch: main

site_url: https://narayanareddy11.github.io/dharani-spices/
display_url: https://narayanareddy11.github.io/dharani-spices/
logo_url: https://narayanareddy11.github.io/dharani-spices/images/dharani-chicken-masala-500g.jpeg

media_folder: images
public_folder: images

collections:
  - name: catalogue
    label: Dharani Catalogue
    files:
      - name: products
        label: Products
        file: data/products.json
        format: json
        fields:
          - label: Products
            name: products
            widget: list
            summary: "{{fields.name}} - {{fields.weight}} - Rs {{fields.price}}"
            fields:
              - label: Product Name
                name: name
                widget: string
              - label: Category
                name: category
                widget: select
                options:
                  - Masala
                  - Powder
                  - Podi
                  - Whole Spice
              - label: Weight
                name: weight
                widget: string
                default: "500 g"
              - label: Price
                name: price
                widget: number
                value_type: int
                min: 0
              - label: Offer
                name: offer
                widget: string
                required: false
              - label: Description
                name: description
                widget: text
              - label: Product Image
                name: image
                widget: image
