<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Dharani Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #211a16;
        --muted: #665b52;
        --line: #e7ddd2;
        --paper: #fffaf4;
        --surface: #ffffff;
        --saffron: #d97706;
        --chilli: #b91c1c;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .login-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .login-panel {
        width: min(100%, 380px);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
        background: var(--surface);
        box-shadow: 0 18px 45px rgba(71, 43, 24, 0.14);
      }

      .brand-mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 8px;
        background: var(--chilli);
        color: white;
        font-weight: 900;
      }

      h1 {
        margin: 16px 0 6px;
        font-size: 1.55rem;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 14px;
        border: 0;
        border-radius: 8px;
        background: var(--saffron);
        color: white;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .error {
        min-height: 20px;
        margin-top: 12px;
        color: var(--chilli);
        font-weight: 800;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="login-screen" id="loginScreen">
      <form class="login-panel" id="loginForm">
        <div class="brand-mark">D</div>
        <h1>Dharani Admin</h1>
        <p>Manage spice products, prices, offers, and images.</p>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
        <button type="submit">Login</button>
        <div class="error" id="error" aria-live="polite"></div>
      </form>
    </main>

    <script>
      const allowedPasswordHash = "09579899e65b49320383a9162a1a7321ea9ad9e51d34e743db176b35a692d704";
      const sessionKey = "dharani_admin_unlocked";

      async function sha256(value) {
        const encoded = new TextEncoder().encode(value);
        const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
        return Array.from(new Uint8Array(hashBuffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      function loadCms() {
        document.querySelector("#loginScreen").classList.add("hidden");
        const script = document.createElement("script");
        script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        document.body.appendChild(script);
      }

      if (sessionStorage.getItem(sessionKey) === "true") {
        loadCms();
      }

      document.querySelector("#loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.querySelector("#password").value;
        const error = document.querySelector("#error");

        if (await sha256(password) === allowedPasswordHash) {
          sessionStorage.setItem(sessionKey, "true");
          loadCms();
          return;
        }

        error.textContent = "Incorrect password.";
      });
    </script>
  </body>
</html>
